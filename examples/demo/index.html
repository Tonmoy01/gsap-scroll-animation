<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>react-scroll-motion-kit Demo</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #f0f0f0; }
      section { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; padding: 4rem 2rem; }
      h1 { font-size: clamp(2rem, 6vw, 5rem); font-weight: 800; }
      h2 { font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 700; }
      p  { font-size: 1.125rem; line-height: 1.7; max-width: 60ch; opacity: 0.8; }
      .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; width: 100%; max-width: 900px; }
      .card { background: #1a1a2e; border-radius: 1rem; padding: 2rem; text-align: center; }
      .card h3 { font-size: 1.25rem; margin-bottom: 0.5rem; }
      .pill { background: #5a4fcf; border-radius: 999px; padding: 0.3rem 1rem; display: inline-block; font-size: 0.85rem; }
      .hero-bg { position: relative; overflow: hidden; }
      .parallax-img { width: 100%; height: 500px; object-fit: cover; border-radius: 1rem; }
      .label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5; }
      hr { border: none; border-top: 1px solid #222; width: 100%; max-width: 900px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
